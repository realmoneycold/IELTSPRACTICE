<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IELTSPRACTICE — Education Centres</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.7.2/css/all.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #1C6758; --dark: #151614; --text: #1a1a1a; --muted: #6b7280;
  --border: #e5e7eb; --bg: #f7f8fa; --white: #fff; --star: #f59e0b;
  --font: 'Poppins', sans-serif;
}
html, body { height: 100%; font-family: var(--font); }
body { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); color: var(--text); }

/* HEADER */
.site-header {
  flex-shrink: 0; background: var(--dark); height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 36px; position: relative; z-index: 200;
  box-shadow: 0 2px 16px rgba(0,0,0,.5);
}
.logo { font-size: 18px; font-weight: 800; color: #fff; }
.header-nav {
  display: flex; align-items: center; gap: 4px;
  position: absolute; left: 50%; transform: translateX(-50%);
}
.header-nav a {
  font-size: 13.5px; color: rgba(255,255,255,.85); text-decoration: none;
  padding: 6px 15px; border-radius: 6px; transition: all .18s;
}
.header-nav a:hover { color: #fff; background: rgba(255,255,255,.08); }
.header-nav a.active { color: #fff; font-weight: 600; }
.btn-started {
  background: var(--green); color: #fff; border: none; border-radius: 100px;
  padding: 9px 22px; font-size: 13.5px; font-weight: 600; cursor: pointer;
  font-family: var(--font); transition: background .2s;
}
.btn-started:hover { background: #155048; }

/* Nav auth buttons — matches index.html Login/Sign Up design */
.nav-auth-index {
  padding: 10px 42px; background: var(--green); border-radius: 100px;
  border: 2px solid var(--green); font-family: var(--font);
  font-size: 16px; font-weight: 600; color: #fff; min-height: 54px;
}
.nav-auth-index .link {
  color: inherit; text-decoration: none; cursor: pointer;
}
.nav-auth-index .link:hover { opacity: 0.9; }

/* SPLIT LAYOUT */
.split { flex: 1; display: flex; min-height: 0; overflow: hidden; }

/* LEFT PANEL */
.panel-left {
  width: 460px; flex-shrink: 0; display: flex; flex-direction: column;
  background: var(--white); border-right: 1px solid var(--border);
  overflow: hidden; min-height: 0;
}
.panel-header { flex-shrink: 0; padding: 18px 20px 14px; border-bottom: 1px solid var(--border); }
.result-lbl { font-size: 11.5px; color: var(--muted); font-weight: 500; margin-bottom: 3px; }
.page-title { font-size: 20px; font-weight: 700; margin-bottom: 13px; }

.search-wrap { position: relative; margin-bottom: 11px; }
.search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 12px; pointer-events: none; }
.search-input {
  width: 100%; padding: 9px 12px 9px 34px; border: 1.5px solid var(--border);
  border-radius: 100px; font-size: 13px; font-family: var(--font); color: var(--text);
  background: var(--bg); outline: none; transition: border-color .2s;
}
.search-input:focus { border-color: var(--green); background: #fff; }
.search-input::placeholder { color: #aaa; }

.pill-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.pill {
  display: inline-flex; align-items: center; gap: 5px; padding: 6px 13px;
  border: 1.5px solid var(--border); border-radius: 100px; font-size: 12px;
  font-weight: 500; color: var(--text); background: var(--white); cursor: pointer;
  transition: all .18s; white-space: nowrap; font-family: var(--font);
}
.pill:hover { border-color: var(--green); color: var(--green); }
.pill.active { background: var(--dark); color: #fff; border-color: var(--dark); }
.pill i { font-size: 10px; }
.pill-icon {
  width: 32px; height: 32px; border: 1.5px solid var(--border); border-radius: 100px;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  background: var(--white); transition: all .18s;
}
.pill-icon:hover { border-color: var(--green); }
.pill-icon i { font-size: 12px; color: var(--muted); }

.sort-bar {
  flex-shrink: 0; padding: 9px 20px; display: flex; align-items: center;
  justify-content: space-between; border-bottom: 1px solid var(--border); background: #fafafa;
}
.sort-lbl { font-size: 11.5px; color: var(--muted); }
.sort-sel {
  font-size: 12px; font-family: var(--font); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 4px 9px; color: var(--text); background: var(--white);
  cursor: pointer; outline: none;
}
.sort-sel:focus { border-color: var(--green); }

.cards-scroll {
  flex: 1; overflow-y: auto; padding: 14px 16px; display: flex;
  flex-direction: column; gap: 12px; min-height: 0;
}
.cards-scroll::-webkit-scrollbar { width: 4px; }
.cards-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

/* CARD */
.centre-card {
  display: flex; gap: 12px; padding: 13px; background: var(--white);
  border-radius: 12px; border: 1.5px solid var(--border);
  box-shadow: 0 1px 6px rgba(0,0,0,.06); cursor: pointer; transition: all .2s;
  position: relative; animation: cardIn .3s ease both;
}
@keyframes cardIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
.centre-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,.11); border-color: #c5d5d1; transform: translateY(-2px); }
.centre-card.is-active { border-color: var(--green); box-shadow: 0 0 0 3px rgba(28,103,88,.15), 0 6px 24px rgba(0,0,0,.11); }

.card-thumb {
  width: 110px; min-width: 110px; height: 84px; border-radius: 9px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 30px;
}
.card-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
.card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.ctag { font-size: 9.5px; font-weight: 700; padding: 2px 7px; border-radius: 20px; letter-spacing:.04em; text-transform:uppercase; }
.ctag-official { background:#e6f4f1; color:#1C6758; }
.ctag-partner  { background:#fff3e8; color:#c25510; }
.ctag-online   { background:#eff6ff; color:#1d4ed8; }
.ctag-open     { background:#f0fdf4; color:#166534; display:flex; align-items:center; gap:3px; }
.ctag-open::before { content:''; width:5px; height:5px; border-radius:50%; background:#22c55e; }

.card-name { font-size: 13.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-stars { display: flex; align-items: center; gap: 4px; }
.stars { display: flex; gap: 1px; }
.sf { color: var(--star); font-size: 10px; }
.se { color: #d1d5db; font-size: 10px; }
.rnum { font-size: 11.5px; font-weight: 700; }
.rcnt { font-size: 10.5px; color: var(--muted); }
.card-info { font-size: 11px; color: var(--muted); display: flex; gap: 6px; flex-wrap: wrap; }
.card-info span { display: flex; align-items: center; gap: 3px; }
.card-info i { font-size: 9px; color: var(--green); }

.card-price-badge { position: absolute; bottom: 12px; right: 12px; text-align: right; }
.cprice-label { font-size: 9px; color: var(--muted); }
.cprice-val { font-size: 14px; font-weight: 700; color: var(--green); }
.cprice-unit { font-size: 9px; color: var(--muted); }

.fav-btn {
  position: absolute; top: 10px; right: 10px; width: 26px; height: 26px;
  border-radius: 50%; background: rgba(255,255,255,.92); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .18s;
}
.fav-btn i { font-size: 10px; color: #aaa; pointer-events: none; }
.fav-btn:hover i, .fav-btn.loved i { color: #e85c5c; }

.no-results {
  display: none; flex-direction: column; align-items: center;
  padding: 60px 20px; text-align: center; color: var(--muted);
}
.no-results i { font-size: 44px; margin-bottom: 14px; opacity: .25; }
.no-results strong { font-size: 14px; }
.no-results small { font-size: 11.5px; margin-top: 4px; display: block; }

/* MAP */
.panel-right { flex: 1; position: relative; min-width: 0; min-height: 0; }
#map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }

/* Price markers */
.pm {
  background: #fff; border: 1.5px solid #bbb; border-radius: 7px;
  padding: 4px 10px; font-family: var(--font); font-size: 11.5px; font-weight: 700;
  color: #1a1a1a; box-shadow: 0 2px 8px rgba(0,0,0,.2); cursor: pointer;
  white-space: nowrap; line-height: 1.2; user-select: none;
  transition: background .15s, color .15s, transform .15s;
}
.pm:hover { background: #222; color: #fff; border-color: #222; }
.pm.pm-active { background: var(--dark); color: #fff; border-color: var(--dark); transform: scale(1.12); }

/* Leaflet popup overrides */
.leaflet-popup-content-wrapper {
  border-radius: 14px !important; padding: 0 !important;
  overflow: hidden !important; box-shadow: 0 8px 32px rgba(0,0,0,.2) !important;
}
.leaflet-popup-content { margin: 0 !important; }
.leaflet-popup-tip-container { display: none !important; }
.leaflet-popup-close-button { top: 6px !important; right: 8px !important; font-size: 20px !important; color: #fff !important; z-index: 10; }

.mpopup { width: 230px; font-family: var(--font); }
.mpopup-img { width:100%; height:110px; display:flex; align-items:center; justify-content:center; font-size:44px; }
.mpopup-body { padding: 10px 13px 13px; }
.mpopup-name { font-size:13px; font-weight:700; margin-bottom:5px; color: var(--text); }
.mpopup-stars { display:flex; align-items:center; gap:4px; margin-bottom:4px; }
.mpopup-loc { font-size:11px; color:var(--muted); margin-bottom:6px; display:flex; align-items:center; gap:3px; }
.mpopup-loc i { color:var(--green); font-size:9px; }
.mpopup-price { font-size:15px; font-weight:700; color:var(--green); margin-bottom:8px; }
.mpopup-btn {
  display:block; width:100%; padding:8px; background:var(--green); color:#fff;
  border:none; border-radius:8px; font-size:12px; font-weight:600;
  cursor:pointer; font-family:var(--font); text-align:center;
}
.mpopup-btn:hover { background:#155048; }

@media (max-width: 768px) {
  body { overflow: auto; }
  .split { flex-direction: column; flex: none; min-height: 0; }
  .panel-left { width:100%; border-right:none; border-bottom:1px solid var(--border); }
  .cards-scroll { max-height: 50vh; }
  .panel-right { height: 420px; flex: none; }
  .header-nav, #nav-auth-buttons { display: none; }
}
</style>
<script src="../js/global-nav.js" defer></script>
</head>
<body>

<header class="site-header">
  <a href="../index.html" class="logo" data-nav="logo" style="text-decoration:none;color:inherit">IELTS PRACTICE</a>
  <nav class="header-nav">
    <a href="../index.html">Home</a>
    <a href="./exam-dates.html">Exam &amp; Mock Dates</a>
    <a href="./education-centres.html" class="active">Education Centres</a>
    <a href="../contact.html">Contact</a>
  </nav>
  <div id="nav-auth-buttons" class="nav-auth-index" style="display:flex;align-items:center;gap:8px"><a href="../login.html" class="link">Login</a><a href="../login/signup.html" class="link">Sign Up</a></div>
</header>

<div class="split">
  <div class="panel-left">
    <div class="panel-header">
      <div class="result-lbl" id="resultLbl">8 centres found</div>
      <div class="page-title">Education Centres</div>
      <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" class="search-input" id="searchInput" placeholder="Search by name, city or district…" oninput="applyFilters()">
      </div>
      <div class="pill-row">
        <button class="pill active" data-t="all"      onclick="setType(this)">All</button>
        <button class="pill"        data-t="Official" onclick="setType(this)"><i class="fa-solid fa-certificate"></i> Official</button>
        <button class="pill"        data-t="Partner"  onclick="setType(this)"><i class="fa-solid fa-handshake"></i> Partner</button>
        <button class="pill"        data-t="Online"   onclick="setType(this)"><i class="fa-solid fa-wifi"></i> Online</button>
        <button class="pill" id="openPill"            onclick="toggleOpen(this)"><i class="fa-regular fa-clock"></i> Open Now</button>
        <div class="pill-icon"><i class="fa-solid fa-sliders"></i></div>
      </div>
    </div>
    <div class="sort-bar">
      <span class="sort-lbl" id="sortLbl">Showing all 8 centres</span>
      <select class="sort-sel" id="sortSel" onchange="applyFilters()">
        <option value="rating">⭐ Top Rated</option>
        <option value="name">A–Z Name</option>
        <option value="price">Price Low–High</option>
        <option value="reviews">Most Reviews</option>
      </select>
    </div>
    <div class="cards-scroll" id="cardsWrap"></div>
    <div class="no-results" id="noResults">
      <i class="fa-solid fa-building-circle-xmark"></i>
      <strong>No centres found</strong>
      <small>Try a different search or filter</small>
    </div>
  </div>

  <div class="panel-right">
    <div id="map"></div>
  </div>
</div>

<script>
// ─── ALL JS IN ONE SCOPE — no duplicate declarations ───────────────────────

const CENTRES = [
  { id:1, name:"British Council Tashkent",   type:"Official", city:"Tashkent",   district:"Yunusabad",     rating:4.9, reviews:312, students:"2,400+", courses:3, price:450000, open:true,  icon:"🏛️", bg:"#c7ede6", lat:41.3111, lng:69.2797 },
  { id:2, name:"IDP Education Tashkent",     type:"Official", city:"Tashkent",   district:"Mirzo Ulugbek", rating:4.8, reviews:278, students:"1,900+", courses:2, price:420000, open:true,  icon:"🎓", bg:"#cfe2f3", lat:41.3205, lng:69.3120 },
  { id:3, name:"IELTSPRACTICE Hub",          type:"Partner",  city:"Tashkent",   district:"Chilonzor",     rating:4.7, reviews:189, students:"950+",   courses:4, price:280000, open:true,  icon:"📚", bg:"#fde8cc", lat:41.2880, lng:69.2060 },
  { id:4, name:"Global Education Samarkand", type:"Partner",  city:"Samarkand",  district:"Centre",        rating:4.6, reviews:145, students:"620+",   courses:2, price:320000, open:false, icon:"🕌", bg:"#ede0ff", lat:39.6542, lng:66.9758 },
  { id:5, name:"Fergana Language Academy",   type:"Partner",  city:"Fergana",    district:"Mustaqillik",   rating:4.5, reviews:98,  students:"410+",   courses:2, price:150000, open:true,  icon:"✏️", bg:"#d0f0fb", lat:40.3864, lng:71.7864 },
  { id:6, name:"Bukhara IELTS Centre",       type:"Partner",  city:"Bukhara",    district:"Old City",      rating:4.4, reviews:76,  students:"300+",   courses:2, price:200000, open:true,  icon:"🏰", bg:"#fde8cc", lat:39.7747, lng:64.4286 },
  { id:7, name:"Online IELTS Pro",           type:"Online",   city:"Nationwide", district:"Remote",        rating:4.7, reviews:423, students:"5,000+", courses:5, price:180000, open:true,  icon:"💻", bg:"#dbeafe", lat:41.2600, lng:69.2200 },
  { id:8, name:"Namangan Study Centre",      type:"Partner",  city:"Namangan",   district:"Central",       rating:4.3, reviews:54,  students:"220+",   courses:2, price:130000, open:false, icon:"🏫", bg:"#d1fae5", lat:40.9983, lng:71.6726 },
];

// State — all in one place
var activeType = 'all';
var onlyOpen   = false;
var activeId   = null;
var favs       = new Set();
var leafMarkers = {};
var mapInstance = null;

// ── STARS HTML ─────────────────────────────────────────────────────────────
function starsHtml(r) {
  var h = '<div class="stars">';
  for (var i = 1; i <= 5; i++) {
    if (i <= Math.floor(r))  h += '<i class="fa-solid fa-star sf"></i>';
    else if (i - r < 1)      h += '<i class="fa-solid fa-star-half-stroke sf"></i>';
    else                     h += '<i class="fa-regular fa-star se"></i>';
  }
  return h + '</div>';
}

// ── RENDER CARDS ───────────────────────────────────────────────────────────
function renderCards(list) {
  var wrap  = document.getElementById('cardsWrap');
  var noRes = document.getElementById('noResults');

  if (!list.length) {
    wrap.innerHTML = '';
    noRes.style.display = 'flex';
    document.getElementById('sortLbl').textContent  = 'No centres found';
    document.getElementById('resultLbl').textContent = '0 centres found';
    return;
  }

  noRes.style.display = 'none';
  document.getElementById('sortLbl').textContent  = 'Showing ' + list.length + ' centre' + (list.length !== 1 ? 's' : '');
  document.getElementById('resultLbl').textContent = list.length + ' centre' + (list.length !== 1 ? 's' : '') + ' found';

  wrap.innerHTML = list.map(function(c, i) {
    return '<div class="centre-card' + (activeId === c.id ? ' is-active' : '') + '" id="card-' + c.id + '" style="animation-delay:' + (i * 0.045) + 's" onclick="selectCentre(' + c.id + ')">' +
      '<div class="card-thumb" style="background:' + c.bg + '">' + c.icon + '</div>' +
      '<div class="card-body">' +
        '<div class="card-tags"><span class="ctag ctag-' + c.type.toLowerCase() + '">' + c.type + '</span>' + (c.open ? '<span class="ctag ctag-open">Open</span>' : '') + '</div>' +
        '<div class="card-name">' + c.name + '</div>' +
        '<div class="card-stars">' + starsHtml(c.rating) + '<span class="rnum">' + c.rating + '</span><span class="rcnt">(' + c.reviews + ')</span></div>' +
        '<div class="card-info"><span><i class="fa-solid fa-users"></i>' + c.students + ' students</span><span><i class="fa-solid fa-book-open"></i>' + c.courses + ' courses</span><span><i class="fa-solid fa-location-dot"></i>' + c.city + '</span></div>' +
      '</div>' +
      '<div class="card-price-badge"><div class="cprice-label">From</div><div class="cprice-val">' + Math.round(c.price/1000) + 'K</div><div class="cprice-unit">UZS/mo</div></div>' +
      '<div class="fav-btn' + (favs.has(c.id) ? ' loved' : '') + '" id="fav-' + c.id + '" onclick="toggleFav(event,' + c.id + ')"><i class="fa-' + (favs.has(c.id) ? 'solid' : 'regular') + ' fa-heart"></i></div>' +
    '</div>';
  }).join('');
}

// ── FILTER + SORT ──────────────────────────────────────────────────────────
function applyFilters() {
  var q    = document.getElementById('searchInput').value.toLowerCase().trim();
  var sort = document.getElementById('sortSel').value;

  var list = CENTRES.filter(function(c) {
    if (activeType !== 'all' && c.type !== activeType) return false;
    if (onlyOpen && !c.open) return false;
    if (q && c.name.toLowerCase().indexOf(q) === -1 &&
             c.city.toLowerCase().indexOf(q) === -1 &&
             c.district.toLowerCase().indexOf(q) === -1) return false;
    return true;
  });

  if (sort === 'rating')  list.sort(function(a,b){ return b.rating  - a.rating; });
  if (sort === 'name')    list.sort(function(a,b){ return a.name.localeCompare(b.name); });
  if (sort === 'price')   list.sort(function(a,b){ return a.price   - b.price; });
  if (sort === 'reviews') list.sort(function(a,b){ return b.reviews - a.reviews; });

  // sync marker visibility
  CENTRES.forEach(function(c) {
    var show = list.some(function(x){ return x.id === c.id; });
    if (leafMarkers[c.id]) leafMarkers[c.id].el.style.display = show ? '' : 'none';
  });

  renderCards(list);
}

// ── SELECT CENTRE ──────────────────────────────────────────────────────────
function selectCentre(id) {
  activeId = id;
  var c = null;
  for (var i = 0; i < CENTRES.length; i++) { if (CENTRES[i].id === id) { c = CENTRES[i]; break; } }
  if (!c) return;

  document.querySelectorAll('.centre-card').forEach(function(el){ el.classList.remove('is-active'); });
  var card = document.getElementById('card-' + id);
  if (card) { card.classList.add('is-active'); card.scrollIntoView({ behavior:'smooth', block:'nearest' }); }

  Object.keys(leafMarkers).forEach(function(mid) {
    leafMarkers[mid].el.classList.toggle('pm-active', Number(mid) === id);
  });

  if (mapInstance) {
    mapInstance.flyTo([c.lat, c.lng], 13, { duration: 1.0 });
    setTimeout(function(){ if (leafMarkers[id]) leafMarkers[id].marker.openPopup(); }, 1100);
  }
}

// ── PILL CONTROLS ──────────────────────────────────────────────────────────
function setType(btn) {
  document.querySelectorAll('[data-t]').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  activeType = btn.dataset.t;
  applyFilters();
}

function toggleOpen(btn) {
  onlyOpen = !onlyOpen;
  btn.classList.toggle('active', onlyOpen);
  applyFilters();
}

function toggleFav(e, id) {
  e.stopPropagation();
  if (favs.has(id)) favs.delete(id); else favs.add(id);
  var btn = document.getElementById('fav-' + id);
  if (!btn) return;
  btn.classList.toggle('loved', favs.has(id));
  btn.querySelector('i').className = favs.has(id) ? 'fa-solid fa-heart' : 'fa-regular fa-heart';
}

// ── MAP INIT — runs after DOM is ready ─────────────────────────────────────
function initMap() {
  if (typeof L === 'undefined') {
    document.querySelector('.panel-right').innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#6b7280;font-family:Poppins,sans-serif;gap:10px">' +
      '<i class="fa-solid fa-map" style="font-size:48px;opacity:.2"></i>' +
      '<p style="font-size:14px;font-weight:600">Map unavailable</p>' +
      '<p style="font-size:12px">Network access required to load the map</p></div>';
    return;
  }

  var map = L.map('map', { center: [41.0, 64.5], zoom: 6, zoomControl: false });
  mapInstance = map;

  L.control.zoom({ position: 'topright' }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  // Build a marker for each centre
  CENTRES.forEach(function(c) {
    var el = document.createElement('div');
    el.className = 'pm';
    el.textContent = Math.round(c.price / 1000) + 'K';
    el.addEventListener('click', function(){ selectCentre(c.id); });

    var icon = L.divIcon({ html: el, className: '', iconSize: [60, 28], iconAnchor: [30, 14] });
    var marker = L.marker([c.lat, c.lng], { icon: icon }).addTo(map);

    var popupHtml =
      '<div class="mpopup">' +
        '<div class="mpopup-img" style="background:' + c.bg + '">' + c.icon + '</div>' +
        '<div class="mpopup-body">' +
          '<div class="mpopup-name">' + c.name + '</div>' +
          '<div class="mpopup-stars">' + starsHtml(c.rating) +
            '<span style="font-size:11px;font-weight:700;margin-left:3px">' + c.rating + '</span>' +
            '<span style="font-size:10px;color:#6b7280;margin-left:2px">(' + c.reviews + ')</span>' +
          '</div>' +
          '<div class="mpopup-loc"><i class="fa-solid fa-location-dot"></i> ' + c.city + ' · ' + c.district + '</div>' +
          '<div class="mpopup-price">' + c.price.toLocaleString() + ' UZS<span style="font-size:10px;font-weight:400;color:#6b7280">/mo</span></div>' +
          '<button class="mpopup-btn" onclick="selectCentre(' + c.id + ')">View Details</button>' +
        '</div>' +
      '</div>';

    marker.bindPopup(popupHtml, { maxWidth: 260, minWidth: 230 });
    leafMarkers[c.id] = { marker: marker, el: el };
  });

  // Must call this AFTER the container has real pixel dimensions
  setTimeout(function(){ map.invalidateSize(); }, 100);
}

// ── BOOT ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  applyFilters();  // render cards first
  initMap();       // then init map
});
</script>
</body>
</html>
