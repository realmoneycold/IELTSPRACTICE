<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IELTSPRACTICE Secure Gateway</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #020617;
      --bg-elevated: #020617;
      --panel: #020617;
      --panel-border: #1f2937;
      --accent: #22c55e;
      --accent-soft: rgba(34,197,94,0.12);
      --accent-muted: #4ade80;
      --danger: #f97373;
      --fg: #e5e7eb;
      --fg-muted: #9ca3af;
      --fg-subtle: #6b7280;
      --input-bg: #020617;
      --input-border: #1f2937;
      --radius: 12px;
      --shadow-lg: 0 24px 60px rgba(0,0,0,0.6);
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "DM Sans", sans-serif;
      --font-display: "SF Pro Display", system-ui, -apple-system, BlinkMacSystemFont, "Playfair Display", serif;
    }

    html, body {
      height: 100%;
      background: radial-gradient(circle at top, #0b1120 0, #020617 45%, #020617 100%);
      color: var(--fg);
      font-family: var(--font-sans);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .frame {
      width: 100%;
      max-width: 420px;
      background: radial-gradient(circle at top left, #020617 0, #020617 40%, #020617 100%);
      border-radius: 24px;
      border: 1px solid rgba(148,163,184,0.16);
      box-shadow: var(--shadow-lg);
      padding: 28px 26px 24px;
      position: relative;
      overflow: hidden;
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 0% 0%, rgba(34,197,94,0.12) 0, transparent 55%),
        radial-gradient(circle at 100% 0%, rgba(56,189,248,0.06) 0, transparent 55%);
      opacity: 0.9;
      pointer-events: none;
    }

    .inner {
      position: relative;
      z-index: 1;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .brand-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .mark {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 0, var(--accent-muted) 0, #16a34a 36%, #15803d 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 1px rgba(34,197,94,0.35);
    }

    .mark span {
      font-size: 0.9rem;
      font-weight: 700;
      color: #052e16;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand-title {
      font-family: var(--font-display);
      font-size: 0.92rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--fg-muted);
    }

    .brand-sub {
      font-size: 0.78rem;
      color: var(--fg-subtle);
    }

    .badge {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(34,197,94,0.25);
      background: rgba(15,23,42,0.9);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--accent-muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--accent-muted);
      box-shadow: 0 0 12px rgba(34,197,94,0.7);
    }

    .headline {
      margin-top: 20px;
      margin-bottom: 10px;
    }

    .headline h1 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .headline span {
      color: var(--accent-muted);
    }

    .headline p {
      margin-top: 6px;
      font-size: 0.85rem;
      color: var(--fg-subtle);
    }

    form {
      margin-top: 22px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--fg-muted);
    }

    .input-wrap {
      position: relative;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid var(--input-border);
      background: radial-gradient(circle at top, #020617 0, #020617 45%, #020617 100%);
      color: var(--fg);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
    }

    input::placeholder {
      color: var(--fg-subtle);
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(34,197,94,0.5), 0 0 30px rgba(34,197,94,0.22);
      background-color: #020617;
    }

    .error {
      display: none;
      margin-top: 4px;
      font-size: 0.78rem;
      color: var(--danger);
    }

    .error.show {
      display: block;
    }

    .btn {
      margin-top: 4px;
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: var(--font-sans);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #022c22;
      box-shadow: 0 18px 40px rgba(34,197,94,0.4);
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 24px 60px rgba(34,197,94,0.55);
    }

    .btn:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 8px 28px rgba(34,197,94,0.35);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: default;
      box-shadow: none;
    }

    .btn span.icon {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 1px solid rgba(22,101,52,0.6);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
    }

    .meta {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.72rem;
      color: var(--fg-subtle);
    }

    .meta span.dot {
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: var(--fg-subtle);
      margin: 0 6px;
    }

    .hint {
      margin-top: 6px;
      font-size: 0.72rem;
      color: var(--fg-subtle);
      text-align: right;
      opacity: 0.6;
    }

    .hint code {
      font-size: 0.7rem;
      background: rgba(15,23,42,0.9);
      padding: 2px 6px;
      border-radius: 999px;
      border: 1px solid rgba(55,65,81,0.8);
    }

    .spinner {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 2px solid rgba(22,101,52,0.2);
      border-top-color: #064e3b;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    .btn.loading .spinner {
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .frame {
        padding: 24px 20px 20px;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="frame" aria-label="IELTSPRACTICE Secure Gateway">
    <div class="inner">
      <div class="brand">
        <div class="brand-left">
          <div class="mark"><span>IP</span></div>
          <div class="brand-text">
            <div class="brand-title">IELTSPRACTICE</div>
            <div class="brand-sub">Secure Gateway</div>
          </div>
        </div>
        <div class="badge">
          <span class="badge-dot"></span>
          ADMIN ACCESS
        </div>
      </div>

      <div class="headline">
        <h1><span>HQ</span> Console Login</h1>
        <p>Restricted entry point. Admin credentials required for access to administrative controls.</p>
      </div>

      <form id="hqForm" novalidate>
        <div class="field">
          <label for="hqEmail">Email</label>
          <div class="input-wrap">
            <input type="email" id="hqEmail" name="email" autocomplete="email" placeholder="admin@ieltspractice.com" required />
          </div>
        </div>

        <div class="field">
          <label for="hqPassword">Password</label>
          <div class="input-wrap">
            <input type="password" id="hqPassword" name="password" autocomplete="current-password" placeholder="••••••••••" required />
          </div>
        </div>

        <div id="hqError" class="error" aria-live="polite"></div>

        <button type="submit" class="btn" id="hqSubmit">
          <span class="spinner" id="hqSpinner"></span>
          <span class="icon">▶</span>
          <span id="hqLabel">Enter HQ</span>
        </button>
      </form>

      <div class="meta">
        <span>IELTSPRACTICE Internal Use</span>
        <span class="dot"></span>
        <span>All access is logged</span>
      </div>

      <div class="hint">
        Route: <code>/api/auth/login</code>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('hqForm');
    const emailInput = document.getElementById('hqEmail');
    const passwordInput = document.getElementById('hqPassword');
    const errorBox = document.getElementById('hqError');
    const submitBtn = document.getElementById('hqSubmit');
    const spinner = document.getElementById('hqSpinner');
    const label = document.getElementById('hqLabel');

    function setError(msg) {
      errorBox.textContent = msg || 'Invalid credentials.';
      errorBox.classList.add('show');
    }

    function clearError() {
      errorBox.textContent = '';
      errorBox.classList.remove('show');
    }

    function setLoading(on) {
      if (on) {
        submitBtn.disabled = true;
        submitBtn.classList.add('loading');
        spinner.style.display = 'inline-block';
        label.textContent = 'Verifying…';
      } else {
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
        spinner.style.display = 'none';
        label.textContent = 'Enter HQ';
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        setError('Invalid credentials.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, role: 'ADMIN' }),
        });

        let data = {};
        try {
          data = await res.json();
        } catch (_) {
          data = {};
        }

        if (!res.ok) {
          setError('Invalid credentials.');
          return;
        }

        const role = (data.role || '').toUpperCase();
        if (role !== 'ADMIN') {
          // Do not allow non-ADMIN logins through this gateway.
          setError('Invalid credentials.');
          return;
        }

        if (!data.token) {
          setError('Invalid credentials.');
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('authToken', data.token);
        localStorage.setItem('role', 'admin');
        if (data.user) {
          localStorage.setItem('user', JSON.stringify(data.user));
        }

        window.location.href = 'admin-dashboard.html';
      } catch (err) {
        console.error(err);
        setError('Invalid credentials.');
      } finally {
        setLoading(false);
      }
    });
  </script>

</body>
</html>
