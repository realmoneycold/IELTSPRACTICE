<!DOCTYPE html>
<html>
<head>
    <title>Auth Test</title>
</head>
<body>
    <h1>Authentication Flow Test</h1>
    <button onclick="testLogin()">Test Login</button>
    <button onclick="testDashboard()">Test Dashboard Access</button>
    <button onclick="clearStorage()">Clear Storage</button>
    <div id="output"></div>

    <script>
        function log(message) {
            document.getElementById('output').innerHTML += '<p>' + message + '</p>';
        }

        async function testLogin() {
            log('Testing login...');
            try {
                const response = await fetch('/api/auth/education/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        centreId: 7,
                        email: 'centre@ieltspractice.com',
                        password: 'Education123!@#'
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    localStorage.setItem('education_token', data.data.token);
                    localStorage.setItem('education_user', JSON.stringify(data.data.user));
                    localStorage.setItem('education_centre', JSON.stringify(data.data.centre));
                    log('✅ Login successful! Token stored.');
                } else {
                    log('❌ Login failed: ' + data.error);
                }
            } catch (error) {
                log('❌ Login error: ' + error.message);
            }
        }

        async function testDashboard() {
            log('Testing dashboard access...');
            const token = localStorage.getItem('education_token');
            if (!token) {
                log('❌ No token found. Please login first.');
                return;
            }

            try {
                const response = await fetch('/api/auth/education/verify', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                const data = await response.json();
                if (data.success) {
                    log('✅ Token valid! User: ' + data.data.user.fullName);
                    log('✅ Centre: ' + data.data.centre.name);
                } else {
                    log('❌ Token invalid: ' + data.error);
                }
            } catch (error) {
                log('❌ Verification error: ' + error.message);
            }
        }

        function clearStorage() {
            localStorage.removeItem('education_token');
            localStorage.removeItem('education_user');
            localStorage.removeItem('education_centre');
            log('🧹 Storage cleared.');
        }
    </script>
</body>
</html>
